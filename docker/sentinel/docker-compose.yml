services:
  redis-master:
    image: redis:7.2-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6381:6379"
  sentinel:
    image: redis:7.2-alpine
    entrypoint: ["redis-server"]
    user: "0:0"
    network_mode: "host"
    depends_on:
      - redis-master
    volumes:
      - ./sentinel.conf:/data/sentinel.conf:Z
    command: ["/data/sentinel.conf", "--sentinel"]
